[global]
   workgroup = WORKGROUP
   server role = standalone server
   security = user
   map to guest = never
   server min protocol = NT1
   server max protocol = SMB3

[scan]
   path = /scan
   browsable = yes
   writable = yes
   read only = no
   valid users = scanner
   oplocks = no
   level2 oplocks = no
   kernel oplocks = no
   strict sync = yes
   sync always = yes